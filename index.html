<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IBI Staff Attendance</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="logo.png">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23000000'/><text x='50%' y='54%' dominant-baseline='middle' text-anchor='middle' fill='%2300c5ff' font-family='Roboto, Arial, sans-serif' font-size='38' font-weight='900'>IBI</text></svg>">
    
    <style>
        :root {
            --bg: #f4f5f7; --surface: #ffffff; --text: #172b4d; --border: #dfe1e6;
            --in-btn: #10b981; --in-btn-active: #059669;
            --out-btn: #ef4444; --out-btn-active: #dc2626;
            --warning: #f59e0b;
        }

        [data-theme="dark"] {
            --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; --border: #334155;
            --in-btn: #059669; --in-btn-active: #047857;
            --out-btn: #dc2626; --out-btn-active: #b91c1c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 20px; display: flex; flex-direction: column;
            align-items: center; min-height: 100vh; transition: background-color 0.3s, color 0.3s;
        }

        .header {
            width: 100%; max-width: 400px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px;
        }

        .theme-toggle {
            background: var(--surface); border: 1px solid var(--border); color: var(--text);
            padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card {
            background-color: var(--surface); width: 100%; max-width: 400px;
            border-radius: 16px; padding: 30px 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box; text-align: center; transition: background-color 0.3s;
        }

        /* Branding Styles */
        .brand-logo {
            max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        .geofence-banner { 
            background-color: var(--warning); color: white; padding: 6px; font-size: 13px; 
            font-weight: 800; border-radius: 6px; margin-bottom: 16px; letter-spacing: 0.5px;
        }

        h2 { margin-top: 0; margin-bottom: 16px; font-size: 22px; }

        /* Location Badge Styles */
        .location-badge {
            display: inline-block; padding: 8px 16px; border-radius: 20px; font-size: 13px;
            font-weight: bold; margin-bottom: 8px; background-color: var(--warning); color: #fff;
            transition: all 0.3s ease;
        }
        .loc-inside { background-color: var(--in-btn); }
        .loc-outside { background-color: var(--out-btn); }

        .debug-text {
            font-size: 11px; color: var(--text); opacity: 0.6; margin-bottom: 24px;
            font-family: monospace; background: var(--bg); padding: 6px; border-radius: 4px;
        }

        .form-group { text-align: left; margin-bottom: 30px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: var(--text); opacity: 0.8; }

        select {
            width: 100%; padding: 16px; font-size: 16px; border-radius: 8px;
            border: 2px solid var(--border); background-color: var(--bg); color: var(--text);
            font-weight: bold; outline: none; transition: border-color 0.2s;
        }
        select:focus { border-color: #3b82f6; }

        .btn-group { display: flex; flex-direction: column; gap: 16px; }

        button.punch-btn {
            width: 100%; padding: 24px; font-size: 22px; font-weight: 800; color: white;
            border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s, opacity 0.3s;
        }
        button.punch-btn:active { transform: scale(0.96); }
        button.punch-btn:disabled { cursor: not-allowed; opacity: 0.4 !important; filter: grayscale(100%); }

        .btn-in { background-color: var(--in-btn); }
        .btn-in:hover:not(:disabled) { background-color: var(--in-btn-active); }
        
        .btn-out { background-color: var(--out-btn); }
        .btn-out:hover:not(:disabled) { background-color: var(--out-btn-active); }

        #status { margin-top: 20px; font-weight: bold; padding: 12px; border-radius: 8px; display: none; }
        .status-success { background-color: #dcfce7; color: #166534; display: block !important; }
        .status-error { background-color: #fee2e2; color: #991b1b; display: block !important; }

        /* --- CUSTOM PWA INSTALL MODAL STYLES --- */
        .install-modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }
        .install-modal {
            background: var(--surface); width: 100%; max-width: 350px; border-radius: 16px;
            padding: 24px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }
        .install-icon { width: 60px; height: 60px; border-radius: 12px; margin-bottom: 16px; }
        .install-title { font-size: 20px; font-weight: bold; margin-bottom: 8px; color: var(--text); }
        .install-desc { font-size: 14px; color: var(--text); opacity: 0.8; margin-bottom: 24px; line-height: 1.5; }
        .btn-install {
            width: 100%; padding: 14px; background: #00c5ff; color: #000; font-weight: bold;
            font-size: 16px; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 12px;
        }
        .btn-install:hover { background: #00a0d1; }
        .btn-dismiss {
            width: 100%; padding: 10px; background: transparent; color: var(--text); opacity: 0.6;
            font-weight: 600; font-size: 14px; border: none; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="installModal" class="install-modal-overlay">
        <div class="install-modal">
            <img src="logo.png" alt="IBI Logo" class="install-icon" onerror="this.style.display='none'">
            <div class="install-title">Install IBI Attendance</div>
            <div class="install-desc">Install this app on your home screen for quick access and background geofencing.</div>
            <button class="btn-install" id="installBtn">📲 Install App Now</button>
            <button class="btn-dismiss" onclick="dismissModal()">Not right now</button>
        </div>
    </div>

    <div class="header">
        <h3 style="margin:0;">IBI Warehouse</h3>
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙 Dark</button>
    </div>

    <div class="card">
        <img src="logo.png" alt="India Business International" class="brand-logo" onerror="this.style.display='none'">
        
        <div class="geofence-banner">🚧 GEOFENCE MODE</div>
        <h2>Staff Attendance</h2>
        
        <div id="locationBadge" class="location-badge">📍 Acquiring GPS...</div>
        <div id="debugLocation" class="debug-text">Your GPS: Loading...</div>

        <div class="form-group">
            <label for="staffName">Select Your Profile</label>
            <select id="staffName" onchange="checkStaffState()">
                <option value="" disabled selected>-- Choose Name & Designation --</option>
                <option value="S Aswin">S. Aswin - WareHouse Packaging Manager</option>
                <option value="M Ajay">M. Ajay - WareHouse Catalogue Manager</option>
            </select>
        </div>

        <div class="btn-group">
            <button class="punch-btn btn-in" id="inBtn" onclick="submitPunch('IN')" disabled>PUNCH IN 🟢</button>
            <button class="punch-btn btn-out" id="outBtn" onclick="submitPunch('OUT')" disabled>PUNCH OUT 🔴</button>
        </div>

        <div id="status"></div>
    </div>

    <script>
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerText = '☀️ Light';
        }
        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                document.getElementById('themeBtn').innerText = '🌙 Dark';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                document.getElementById('themeBtn').innerText = '☀️ Light';
            }
        }

        // ==========================================
        // 🌍 SMART GEOFENCE CONFIGURATION
        // ==========================================
        const WAREHOUSE_LAT = 8.202612; 
        const WAREHOUSE_LNG = 77.240076; 
        const ALLOWED_RADIUS = 50; 

        let isInsideWarehouse = false;
        let gpsWatcher = null;

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.round(R * c); 
        }

        function startGeofence() {
            if (!navigator.geolocation) {
                document.getElementById('locationBadge').innerText = "❌ GPS Not Supported";
                return;
            }

            gpsWatcher = navigator.geolocation.watchPosition(
                (position) => {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;
                    
                    document.getElementById('debugLocation').innerText = `Your GPS: ${userLat.toFixed(6)}, ${userLng.toFixed(6)}`;

                    const distance = getDistance(userLat, userLng, WAREHOUSE_LAT, WAREHOUSE_LNG);
                    const badge = document.getElementById('locationBadge');

                    if (distance <= ALLOWED_RADIUS) {
                        isInsideWarehouse = true;
                        badge.innerText = `✅ Inside Zone (${distance}m)`;
                        badge.className = "location-badge loc-inside";
                    } else {
                        isInsideWarehouse = false;
                        badge.innerText = `⛔ Too Far: ${distance}m away`;
                        badge.className = "location-badge loc-outside";
                        
                        const staffName = document.getElementById('staffName').value;
                        if (staffName) {
                            const lastPunch = localStorage.getItem('ibi_punch_' + staffName);
                            if (lastPunch === 'IN') {
                                submitPunch('OUT', true); 
                            }
                        }
                    }
                    checkStaffState();
                },
                (error) => {
                    document.getElementById('locationBadge').innerText = "⚠️ Please Allow Location Access";
                    document.getElementById('locationBadge').className = "location-badge loc-outside";
                    console.warn("GPS Error:", error.message);
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
            );
        }

        startGeofence();

        // ==========================================
        // 🔒 STRICT BUTTON SEQUENCE LOGIC
        // ==========================================
        function checkStaffState() {
            const staffName = document.getElementById('staffName').value;
            const inBtn = document.getElementById('inBtn');
            const outBtn = document.getElementById('outBtn');
            
            if (!staffName) return;

            const lastPunch = localStorage.getItem('ibi_punch_' + staffName);
            
            // 1. Core Sequence Logic: Prevent OUT unless they are explicitly IN.
            if (lastPunch === 'IN') {
                inBtn.disabled = true;   // Cannot punch IN again
                outBtn.disabled = false; // Permitted to punch OUT
            } else {
                inBtn.disabled = false;  // Ready to punch IN (null/empty memory starts here)
                outBtn.disabled = true;  // Locked. Cannot punch OUT yet.
            }

            // 2. Geofence Logic: Lock IN button if they are physically outside
            if (!isInsideWarehouse) {
                inBtn.disabled = true;
            }
        }

        function speakThankYou() {
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance("Thank You, from India Business International");
                msg.rate = 0.9; 
                window.speechSynthesis.speak(msg);
            }
        }

        const scriptURL = 'https://script.google.com/macros/s/AKfycbz-FSxUBuzfRBD6nOp26-paZnjw2XtCOJtdD9gs5ZYm5VWTliZcgFxI_8ROxvRAI_s/exec';

        function submitPunch(action, isAuto = false) {
            const staffName = document.getElementById('staffName').value;
            const statusDiv = document.getElementById('status');
            const inBtn = document.getElementById('inBtn');
            const outBtn = document.getElementById('outBtn');

            if (!staffName) {
                if(!isAuto) alert("Please select your name first!");
                return;
            }

            inBtn.disabled = true;
            outBtn.disabled = true;
            statusDiv.className = '';
            
            if(isAuto) {
                statusDiv.innerText = 'Boundary exited. Auto-punching OUT...';
            } else {
                statusDiv.innerText = 'Recording punch... please wait.';
            }
            statusDiv.style.display = 'block';

            const formData = new FormData();
            formData.append('staffName', staffName);
            formData.append('action', action);

            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        statusDiv.innerText = `Success! ${action} recorded for ${staffName} at ${time}.`;
                        statusDiv.className = 'status-success';
                        
                        if(!isAuto) speakThankYou();
                        
                        localStorage.setItem('ibi_punch_' + staffName, action);
                    } else {
                        statusDiv.innerText = `Google Error: ${data.message}`;
                        statusDiv.className = 'status-error';
                    }
                    
                    document.getElementById('staffName').value = ""; 
                    checkStaffState(); 
                    
                    setTimeout(() => { statusDiv.style.display = 'none'; }, 8000);
                })
                .catch(error => {
                    statusDiv.innerText = 'Network error. Please try again.';
                    statusDiv.className = 'status-error';
                    checkStaffState();
                });
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .catch(err => console.log('PWA SW failed: ', err));
            });
        }

        // --- AGGRESSIVE INSTALL LOGIC ---
        let deferredPrompt;
        const installModal = document.getElementById('installModal');
        const installBtn = document.getElementById('installBtn');

        // Check if the app is already installed and running standalone
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

        if (!isStandalone) {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                
                // Pop it up shortly after page load
                setTimeout(showModal, 1500);
            });
        }

        function showModal() {
            if (deferredPrompt && !isStandalone) {
                installModal.style.display = 'flex';
            }
        }

        // When they try to click "Not right now"
        function dismissModal() {
            installModal.style.display = 'none';
            // THE AGGRESSIVE LOOP: Pop back up in exactly 45 seconds
            setTimeout(showModal, 45000); 
        }

        // When they click the Install button
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                installModal.style.display = 'none';
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                
                if (outcome === 'accepted') {
                    deferredPrompt = null; // Success! They installed it.
                } else {
                    // They hit Cancel on the Chrome prompt. Punish them with the 45-second loop.
                    setTimeout(showModal, 45000);
                }
            }
        });

        // Kill the loop permanently once successfully installed
        window.addEventListener('appinstalled', () => {
            installModal.style.display = 'none';
            deferredPrompt = null;
            console.log('PWA was installed successfully');
        });
    </script>

</body>
</html>
